{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.redirectFromWeb }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "kube-app-manager-webc.fullname" . }}-redirect
  labels:
    {{- include "kube-app-manager-webc.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kube-app-manager-webc.fullname" . }}-web
  labels:
    {{- include "kube-app-manager-webc.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.ingress.webEntryPoint | quote }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ printf "%s-redirect@kubernetescrd" (include "kube-app-manager-webc.fullname" .) | quote }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "kube-app-manager-webc.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kube-app-manager-webc.fullname" . }}
  labels:
    {{- include "kube-app-manager-webc.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.ingress.webSecureEntryPoint | quote }}
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "kube-app-manager-webc.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
