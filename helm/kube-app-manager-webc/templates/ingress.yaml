{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.redirectFromWeb }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "kube-app-manager-webc.fullname" . }}-redirect
  labels:
    {{- include "kube-app-manager-webc.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "kube-app-manager-webc.fullname" . }}-web
  labels:
    {{- include "kube-app-manager-webc.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.ingress.webEntryPoint | quote }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.path }}`)
      middlewares:
        - name: {{ include "kube-app-manager-webc.fullname" . }}-redirect
      services:
        - name: {{ include "kube-app-manager-webc.fullname" . }}
          port: {{ .Values.service.port }}
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "kube-app-manager-webc.fullname" . }}
  labels:
    {{- include "kube-app-manager-webc.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.ingress.webSecureEntryPoint | quote }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ include "kube-app-manager-webc.tlsSecretName" . }}
  {{- end }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`{{ .Values.ingress.path }}`)
      services:
        - name: {{ include "kube-app-manager-webc.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
